<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandy ART</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f7f4ee;color:#222;font-family:Arial,Helvetica,sans-serif}
header{padding:34px 32px 20px}
h1{margin:0;font-size:30px;font-weight:500;letter-spacing:.05em}
.subtitle{margin-top:8px;color:#666}
.filters{display:flex;gap:10px;flex-wrap:wrap;padding:0 32px 18px}
button{border:1px solid #bbb;background:white;padding:8px 12px;border-radius:999px;cursor:pointer}
button.active{background:#222;color:white}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:26px;padding:10px 32px 44px}
.card{text-decoration:none;color:inherit}
.thumb{width:100%;aspect-ratio:1/1;background:#e6e0d7;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.12)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.caption{margin-top:9px;font-size:14px}
.meta{font-size:12px;color:#777;margin-top:3px}
</style>
</head>
<body>
<header>
  <h1>Mandy ART</h1>
  <div class="subtitle">Paintings and works in progress</div>
</header>
<nav class="filters" id="filters"></nav>
<main class="grid" id="gallery"></main>

<script>
let allArtworks = [];
const gallery = document.getElementById("gallery");
const filters = document.getElementById("filters");

function render(category="All"){
  gallery.innerHTML = "";
  const items = category === "All" ? allArtworks : allArtworks.filter(a => a.category === category);
  items.forEach(a => {
    const card = document.createElement("a");
    card.className = "card";
    card.href = "view.html?id=" + encodeURIComponent(a.id);
    card.innerHTML = `
      <div class="thumb"><img src="${a.image}" alt="${a.title}"></div>
      <div class="caption">${a.title}</div>
      <div class="meta">${[a.year,a.medium,a.size].filter(Boolean).join(" · ")}</div>
    `;
    gallery.appendChild(card);
  });
}

function makeFilters(){
  const categories = ["All", ...new Set(allArtworks.map(a => a.category).filter(Boolean))];
  filters.innerHTML = "";
  categories.forEach((c,i) => {
    const btn = document.createElement("button");
    btn.textContent = c;
    if(i===0) btn.className = "active";
    btn.onclick = () => {
      document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render(c);
    };
    filters.appendChild(btn);
  });
}

fetch("artworks.json")
  .then(r => r.json())
  .then(data => {
    allArtworks = data;
    makeFilters();
    render();
  })
  .catch(() => {
    gallery.innerHTML = "<p>artworks.json could not be loaded.</p>";
  });
</script>
</body>
</html>
